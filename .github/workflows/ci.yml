name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Validate CloudFormation controls
        run: |
          python -m pip install cfn-lint==1.53.0
          cfn-lint infrastructure/aws/medi-private-storage.json

      - name: Validate operator runbooks
        run: python scripts/verify_operator_runbooks.py

  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations on a fresh database
        env:
          DATABASE_URL: sqlite:////tmp/medi-ci.db
        run: alembic upgrade head

      - name: Seed demo data
        env:
          DATABASE_URL: sqlite:////tmp/medi-ci.db
        run: python -m backend.seed

      - name: Compile backend
        run: python -m compileall backend

      - name: Verify external AI egress policy
        run: python scripts/verify_external_ai_egress.py

      - name: Run backend tests
        run: python -m pytest backend/tests

  postgres-migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medi_migration_qa
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d medi_migration_qa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Rehearse PostgreSQL upgrade and rollback cycle
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/medi_migration_qa
          DATABASE_POOL_SIZE: "3"
          DATABASE_MAX_OVERFLOW: "1"
          DATABASE_POOL_TIMEOUT_SECONDS: "2"
          DATABASE_STATEMENT_TIMEOUT_MS: "250"
          DATABASE_SLOW_QUERY_THRESHOLD_MS: "100"
        run: |
          set -euo pipefail
          alembic upgrade head
          head_revision="$(alembic heads | awk 'NR == 1 { print $1 }')"
          current_revision="$(alembic current | awk 'NR == 1 { print $1 }')"
          test "$current_revision" = "$head_revision"
          alembic downgrade base
          test -z "$(alembic current)"
          alembic upgrade head
          current_revision="$(alembic current | awk 'NR == 1 { print $1 }')"
          test "$current_revision" = "$head_revision"
          python -m scripts.verify_database_runtime

  recovery-drill:
    name: Encrypted recovery drill
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run encrypted PostgreSQL and synthetic-object restore drill
        env:
          PYTHON_BIN: python
        run: bash scripts/verify_backup_restore_drill.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  container-hardening:
    name: Container hardening
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build, start, and verify hardened application containers
        run: |
          set -euo pipefail
          status=0
          docker compose up --build --wait --wait-timeout 180 || status=$?
          if [[ "$status" -eq 0 ]]; then
            python3 scripts/verify_container_hardening.py || status=$?
          fi
          if [[ "$status" -ne 0 ]]; then
            docker compose ps
            docker compose logs --no-color --tail 100 backend frontend
          fi
          docker compose down --volumes
          exit "$status"

  supply-chain:
    name: Supply chain security
    runs-on: ubuntu-latest

    steps:
      - name: Check out complete repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install audit tooling and frontend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.10.1
          npm ci --prefix frontend

      - name: Audit secrets, dependencies, and runtime images
        env:
          PYTHON_BIN: python
        run: bash scripts/verify_supply_chain.sh
