name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate CloudFormation controls
        run: |
          python -m pip install cfn-lint==1.53.0
          cfn-lint infrastructure/aws/medi-private-storage.json

  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations on a fresh database
        env:
          DATABASE_URL: sqlite:////tmp/medi-ci.db
        run: alembic upgrade head

      - name: Seed demo data
        env:
          DATABASE_URL: sqlite:////tmp/medi-ci.db
        run: python -m backend.seed

      - name: Compile backend
        run: python -m compileall backend

      - name: Run backend tests
        run: python -m pytest backend/tests

  postgres-migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medi_migration_qa
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d medi_migration_qa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Rehearse PostgreSQL upgrade and rollback cycle
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/medi_migration_qa
        run: |
          set -euo pipefail
          alembic upgrade head
          head_revision="$(alembic heads | awk 'NR == 1 { print $1 }')"
          current_revision="$(alembic current | awk 'NR == 1 { print $1 }')"
          test "$current_revision" = "$head_revision"
          alembic downgrade base
          test -z "$(alembic current)"
          alembic upgrade head
          current_revision="$(alembic current | awk 'NR == 1 { print $1 }')"
          test "$current_revision" = "$head_revision"

  recovery-drill:
    name: Encrypted recovery drill
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run encrypted PostgreSQL and synthetic-object restore drill
        env:
          PYTHON_BIN: python
        run: bash scripts/verify_backup_restore_drill.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
