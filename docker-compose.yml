services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medical_annotations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medical_annotations"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/medical_annotations
      TOKEN_SECRET: change-this-before-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - scan_storage:/app/backend/data/sample_scan
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  scan_storage:
